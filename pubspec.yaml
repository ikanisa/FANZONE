name: fanzone
description: "FANZONE — Sports-bar ordering, match pools, and FET wallet."
publish_to: 'none'

version: 1.1.3+11

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Navigation ──
  go_router: ^15.1.2

  # ── State Management ──
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Firebase ──
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # ── Data / Backend ──
  supabase_flutter: ^2.9.0

  # ── Models ──
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Local Storage ──
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── UI / Design ──
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  flutter_cache_manager: ^3.4.1

  # ── Utilities ──
  intl: ^0.20.2
  share_plus: ^12.0.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.1
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  app_links: ^7.0.0
  geolocator: ^14.0.2
  flutter_secure_storage: ^10.1.0
  country_picker: ^2.0.27

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  path_provider_platform_interface: ^2.1.2
  riverpod_generator: ^2.6.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/brand/
    - assets/icons/

  # Font families are vendored into assets/fonts for deterministic tests/builds.
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: Bebas Neue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
          weight: 400
