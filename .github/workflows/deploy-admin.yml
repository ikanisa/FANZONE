# FANZONE Admin Panel — Cloudflare Pages Deployment
# Manual-only fallback. Local Cloudflare Pages deploys are the primary free-account release path.

name: Deploy Admin Panel

# Automatic GitHub Actions deploys are disabled for the free-account release model.
# Use tool/deploy_cloudflare_pages.sh for local Cloudflare Pages deploys.
on:
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
  VITE_APP_ENV: production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/admin

      - name: Lint
        run: npm run lint
        working-directory: apps/admin

      - name: Test
        run: npm run test
        working-directory: apps/admin

      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/admin

      - name: Validate browser release env
        run: ../../tool/validate_web_release_env.sh admin
        working-directory: apps/admin

      - name: Build
        run: npm run build
        working-directory: apps/admin

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/admin/dist --project-name=fanzone-admin --branch=${{ github.ref_name }}

      - name: Deployment summary
        run: |
          echo "## 🚀 Admin Panel Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
            echo "**URL:** https://fanzone-admin.pages.dev" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Environment:** Preview" >> $GITHUB_STEP_SUMMARY
            echo "**URL:** https://${{ github.ref_name }}.fanzone-admin.pages.dev" >> $GITHUB_STEP_SUMMARY
          fi
