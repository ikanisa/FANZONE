name: FANZONE CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.38.9'

jobs:
  security-audit:
    name: Dependency And Secret Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            scripts/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Audit root workspace dependencies
        run: npm audit --audit-level=moderate

      - name: Install scripts dependencies
        working-directory: scripts
        run: npm ci --ignore-scripts

      - name: Audit scripts dependencies
        working-directory: scripts
        run: npm audit --audit-level=moderate

      - name: Block obvious live credentials
        run: |
          set -euo pipefail

          PATTERN='(eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}|sbp_[A-Za-z0-9_-]{20,}|postgresql://[^[:space:]]+:[^[:space:]]+@)'

          if git grep -nE "$PATTERN" -- \
            ':!.github/workflows/ci.yml' \
            ':!.github/workflows/secret-regex-scan.yml' \
            ':!docs/free-account-release.md' \
            ':!docs/secret-rotation-runbook.md' \
            ':!.env*.example' \
            ':!**/.env*.example' \
            ':!**/package-lock.json'; then
            echo "Potential live credential found. Rotate it and remove it from git."
            exit 1
          fi

  supabase-contracts:
    name: Supabase Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Enforce verification secret configuration
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_BOOTSTRAP_DB_URL: ${{ secrets.SUPABASE_BOOTSTRAP_DB_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          test -n "${SUPABASE_URL}" || {
            echo "Missing SUPABASE_URL secret for release probe verification." >&2
            exit 1
          }
          test -n "${SUPABASE_ANON_KEY}" || {
            echo "Missing SUPABASE_ANON_KEY secret for release probe verification." >&2
            exit 1
          }
          test -n "${SUPABASE_DB_URL}" || {
            echo "Missing SUPABASE_DB_URL secret for SQL policy verification." >&2
            exit 1
          }
          if [[ -z "${SUPABASE_BOOTSTRAP_DB_URL}" ]]; then
            echo "SUPABASE_BOOTSTRAP_DB_URL is not set; disposable bootstrap verification will be skipped." >&2
          fi

      - name: Validate shell tooling
        run: |
          bash -n tool/supabase_release_probe.sh \
            tool/supabase_bootstrap_smoke.sh \
            tool/supabase_edge_job_smoke.sh \
            tool/supabase_whatsapp_auth_smoke.sh \
            tool/supabase_live_validation.sh \
            tool/supabase_rls_audit.sh \
            tool/supabase_fet_supply_smoke.sh \
            tool/resolve_dart_define_file.sh \
            tool/flutter_analyze_release.sh \
            tool/build_android_release_from_env.sh \
            tool/build_android_aab_from_env.sh \
            tool/build_ios_release_from_env.sh \
            tool/validate_web_release_env.sh

      - name: Install PostgreSQL client
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Supabase bootstrap smoke
        if: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && secrets.SUPABASE_BOOTSTRAP_DB_URL != '' }}
        env:
          SUPABASE_BOOTSTRAP_DB_URL: ${{ secrets.SUPABASE_BOOTSTRAP_DB_URL }}
        run: ./tool/supabase_bootstrap_smoke.sh

      - name: Run Supabase release probe
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./tool/supabase_release_probe.sh

      - name: Run Supabase WhatsApp auth smoke
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./tool/supabase_whatsapp_auth_smoke.sh

      - name: Run Supabase SQL audits
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          ./tool/supabase_rls_audit.sh
          ./tool/supabase_fet_supply_smoke.sh

      - name: Check Edge Function formatting
        run: deno fmt --check supabase/functions

      - name: Type-check Edge Functions
        run: |
          find supabase/functions -name '*.ts' -print0 | xargs -0 deno check

      - name: Run Edge Function tests
        run: deno test --allow-env supabase/functions

  admin-build:
    name: Admin Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install admin dependencies
        working-directory: apps/admin
        run: npm ci

      - name: Lint admin
        working-directory: apps/admin
        run: npm run lint

      - name: Test admin
        working-directory: apps/admin
        run: npm run test

      - name: Build admin
        working-directory: apps/admin
        run: npm run build

  website-build:
    name: Website Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/website/package-lock.json

      - name: Install website dependencies
        working-directory: apps/website
        run: npm ci

      - name: Lint website
        working-directory: apps/website
        run: npm run lint

      - name: Build website
        working-directory: apps/website
        run: npm run build

      - name: Validate website release metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/website
        run: npm run validate:release-metadata

  venue-portal-build:
    name: Venue Dashboard Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check venue dashboard
        run: npm run typecheck -w @fanzone/venue-portal

      - name: Lint venue dashboard
        run: npm run lint -w @fanzone/venue-portal

      - name: Build venue dashboard
        run: npm run build -w @fanzone/venue-portal

  tv-display-build:
    name: TV Display Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check TV display
        run: npm run typecheck -w @fanzone/tv-display

      - name: Lint TV display
        run: npm run lint -w @fanzone/tv-display

      - name: Build TV display
        run: npm run build -w @fanzone/tv-display

  flutter-lint:
    name: Flutter Lint Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Validate generated sources are committed
        run: |
          test -z "$(git status --porcelain -- lib test)" || (
            git status --short -- lib test
            echo "Generated files are out of date. Run build_runner and commit the results." >&2
            exit 1
          )

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test tool

      - name: Analyze
        run: ./tool/flutter_analyze_release.sh

  flutter-test:
    name: Flutter Test Gate
    runs-on: ubuntu-latest
    needs: [flutter-lint]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run startup and cache regression tests
        run: flutter test test/startup_budget_test.dart test/structured_cache_store_test.dart

      - name: Run tests
        run: flutter test --coverage

      - name: Check test coverage
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "Coverage report generated."
            COVERED=$(grep -c "DA:" coverage/lcov.info || true)
            echo "Lines with coverage data: $COVERED"
          fi

  flutter-build-verify:
    name: Flutter Build Verify
    runs-on: ubuntu-latest
    needs: [flutter-lint, flutter-test]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify debug APK build
        run: flutter build apk --debug

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [supabase-contracts, admin-build, website-build, venue-portal-build, tv-display-build, flutter-lint, flutter-test, flutter-build-verify]
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare production dart-define file
        run: |
          cat > env/ci.production.json <<EOF
          {
            "APP_ENV": "production",
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "SENTRY_DSN": "${{ secrets.SENTRY_DSN }}"
          }
          EOF

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define-from-file=env/ci.production.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [supabase-contracts, admin-build, website-build, venue-portal-build, tv-display-build, flutter-lint, flutter-test, flutter-build-verify]
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare production dart-define file
        run: |
          cat > env/ci.production.json <<EOF
          {
            "APP_ENV": "production",
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "SENTRY_DSN": "${{ secrets.SENTRY_DSN }}"
          }
          EOF

      - name: Build iOS (no codesign)
        run: |
          DART_DEFINES=$(python3 - <<'PY'
          import base64
          import json

          with open("env/ci.production.json", "r", encoding="utf-8") as handle:
              data = json.load(handle)

          def encode_value(value):
              if isinstance(value, bool):
                  return "true" if value else "false"
              return str(value)

          print(
              ",".join(
                  base64.b64encode(f"{key}={encode_value(value)}".encode("utf-8")).decode("utf-8")
                  for key, value in data.items()
              )
          )
          PY
          )

          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            DART_DEFINES="$DART_DEFINES" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive \
            -archivePath build/ios/archive/Runner.xcarchive
