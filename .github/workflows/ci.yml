name: FANZONE CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.27.4'

jobs:
  supabase-contracts:
    name: Supabase Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Enforce verification secret configuration
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_BOOTSTRAP_DB_URL: ${{ secrets.SUPABASE_BOOTSTRAP_DB_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          test -n "${SUPABASE_URL}" || {
            echo "Missing SUPABASE_URL secret for release probe verification." >&2
            exit 1
          }
          test -n "${SUPABASE_ANON_KEY}" || {
            echo "Missing SUPABASE_ANON_KEY secret for release probe verification." >&2
            exit 1
          }
          test -n "${SUPABASE_BOOTSTRAP_DB_URL}" || {
            echo "Missing SUPABASE_BOOTSTRAP_DB_URL secret for SQL bootstrap verification." >&2
            exit 1
          }
          test -n "${SUPABASE_DB_URL}" || {
            echo "Missing SUPABASE_DB_URL secret for SQL policy verification." >&2
            exit 1
          }

      - name: Validate shell tooling
        run: |
          bash -n tool/supabase_release_probe.sh \
            tool/supabase_bootstrap_smoke.sh \
            tool/supabase_edge_job_smoke.sh \
            tool/supabase_whatsapp_auth_smoke.sh \
            tool/supabase_rls_audit.sh \
            tool/supabase_fet_supply_smoke.sh \
            tool/resolve_dart_define_file.sh \
            tool/flutter_analyze_release.sh \
            tool/build_android_release_from_env.sh \
            tool/build_android_aab_from_env.sh \
            tool/build_ios_release_from_env.sh

      - name: Install PostgreSQL client
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Supabase bootstrap smoke
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_BOOTSTRAP_DB_URL: ${{ secrets.SUPABASE_BOOTSTRAP_DB_URL }}
        run: ./tool/supabase_bootstrap_smoke.sh

      - name: Run Supabase release probe
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./tool/supabase_release_probe.sh

      - name: Run Supabase WhatsApp auth smoke
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./tool/supabase_whatsapp_auth_smoke.sh

      - name: Run Supabase SQL audits
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          ./tool/supabase_rls_audit.sh
          ./tool/supabase_fet_supply_smoke.sh

      - name: Check Edge Function formatting
        run: |
          deno fmt --check \
            supabase/functions/whatsapp-otp/index.ts \
            supabase/functions/auto-settle/index.ts \
            supabase/functions/push-notify/index.ts \
            supabase/functions/gemini-team-news/index.ts \
            supabase/functions/gemini-currency-rates/index.ts

      - name: Type-check Edge Functions
        run: |
          deno check \
            supabase/functions/whatsapp-otp/index.ts \
            supabase/functions/auto-settle/index.ts \
            supabase/functions/push-notify/index.ts \
            supabase/functions/gemini-team-news/index.ts \
            supabase/functions/gemini-currency-rates/index.ts

      - name: Run Edge Function tests
        run: deno test supabase/functions

  admin-build:
    name: Admin Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Lint admin
        working-directory: admin
        run: npm run lint

      - name: Test admin
        working-directory: admin
        run: npm run test

      - name: Build admin
        working-directory: admin
        run: npm run build

  flutter-lint:
    name: Flutter Lint Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Validate generated sources are committed
        run: |
          test -z "$(git status --porcelain -- lib test)" || (
            git status --short -- lib test
            echo "Generated files are out of date. Run build_runner and commit the results." >&2
            exit 1
          )

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Analyze
        run: ./tool/flutter_analyze_release.sh

  flutter-test:
    name: Flutter Test Gate
    runs-on: ubuntu-latest
    needs: [flutter-lint]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run startup and cache regression tests
        run: flutter test test/startup_budget_test.dart test/structured_cache_store_test.dart

      - name: Run tests
        run: flutter test --coverage

      - name: Check test coverage
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "Coverage report generated."
            COVERED=$(grep -c "DA:" coverage/lcov.info || true)
            echo "Lines with coverage data: $COVERED"
          fi

  flutter-build-verify:
    name: Flutter Build Verify
    runs-on: ubuntu-latest
    needs: [flutter-lint, flutter-test]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify debug APK build
        run: flutter build apk --debug

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [supabase-contracts, admin-build, flutter-lint, flutter-test, flutter-build-verify]
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare production dart-define file
        run: |
          cat > env/ci.production.json <<EOF
          {
            "APP_ENV": "production",
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "SENTRY_DSN": "${{ secrets.SENTRY_DSN }}",
            "ENABLE_PREDICTIONS": "true",
            "ENABLE_WALLET": "true",
            "ENABLE_LEADERBOARD": "true",
            "ENABLE_REWARDS": "true",
            "ENABLE_MEMBERSHIP": "true",
            "ENABLE_NOTIFICATIONS": "true",
            "ENABLE_TEAM_COMMUNITIES": "true",
            "ENABLE_FAN_IDENTITY": "true",
            "ENABLE_MARKETPLACE": "true",
            "ENABLE_FEATURED_EVENTS": "true",
            "ENABLE_GLOBAL_CHALLENGES": "false",
            "ENABLE_REGION_DISCOVERY": "true"
          }
          EOF

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define-from-file=env/ci.production.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [supabase-contracts, admin-build, flutter-lint, flutter-test, flutter-build-verify]
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare production dart-define file
        run: |
          cat > env/ci.production.json <<EOF
          {
            "APP_ENV": "production",
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "SENTRY_DSN": "${{ secrets.SENTRY_DSN }}",
            "ENABLE_PREDICTIONS": "true",
            "ENABLE_WALLET": "true",
            "ENABLE_LEADERBOARD": "true",
            "ENABLE_REWARDS": "true",
            "ENABLE_MEMBERSHIP": "true",
            "ENABLE_NOTIFICATIONS": "true",
            "ENABLE_TEAM_COMMUNITIES": "true",
            "ENABLE_FAN_IDENTITY": "true",
            "ENABLE_MARKETPLACE": "true",
            "ENABLE_FEATURED_EVENTS": "true",
            "ENABLE_GLOBAL_CHALLENGES": "false",
            "ENABLE_REGION_DISCOVERY": "true"
          }
          EOF

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define-from-file=env/ci.production.json
