name: Team News Ingestion

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: Team id to ingest for
        required: true
        type: string
      team_name:
        description: Team name to search for
        required: true
        type: string
      categories:
        description: JSON array of categories
        required: false
        default: '["general"]'
        type: string
      max_articles:
        description: Max grounded draft articles to store
        required: false
        default: '6'
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  TEAM_NEWS_SYNC_SECRET: ${{ secrets.TEAM_NEWS_SYNC_SECRET }}

jobs:
  ingest-team-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger team news ingestion
        run: |
          echo "Triggering team news ingestion for ${TEAM_NAME}"

          payload=$(jq -cn \
            --arg teamId "${TEAM_ID}" \
            --arg teamName "${TEAM_NAME}" \
            --argjson categories "${CATEGORIES}" \
            --argjson maxArticles "${MAX_ARTICLES}" \
            '{teamId: $teamId, teamName: $teamName, categories: $categories, maxArticles: $maxArticles}')

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "x-team-news-sync-secret: $TEAM_NEWS_SYNC_SECRET" \
            "$SUPABASE_URL/functions/v1/gemini-team-news" \
            -d "$payload")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Team news ingestion failed"
            exit 1
          fi
        env:
          TEAM_ID: ${{ inputs.team_id }}
          TEAM_NAME: ${{ inputs.team_name }}
          CATEGORIES: ${{ inputs.categories }}
          MAX_ARTICLES: ${{ inputs.max_articles }}
