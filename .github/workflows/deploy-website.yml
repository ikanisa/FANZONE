name: Deploy Website

# Automatic GitHub Actions deploys are disabled for the free-account release model.
# Use tool/deploy_cloudflare_pages.sh for local Cloudflare Pages deploys.
on:
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_WEBSITE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_WEBSITE_PROJECT_NAME }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
  VITE_APP_ENV: production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare website configuration
        run: |
          test -n "${CLOUDFLARE_API_TOKEN}" || {
            echo "Missing CLOUDFLARE_API_TOKEN secret." >&2
            exit 1
          }
          test -n "${CLOUDFLARE_ACCOUNT_ID}" || {
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret." >&2
            exit 1
          }
          test -n "${CLOUDFLARE_WEBSITE_PROJECT_NAME}" || {
            echo "Missing CLOUDFLARE_WEBSITE_PROJECT_NAME secret." >&2
            exit 1
          }
          test -n "${VITE_SUPABASE_URL}" || {
            echo "Missing VITE_SUPABASE_URL secret." >&2
            exit 1
          }
          test -n "${VITE_SUPABASE_ANON_KEY}" || {
            echo "Missing VITE_SUPABASE_ANON_KEY secret." >&2
            exit 1
          }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/website

      - name: Lint
        run: npm run lint
        working-directory: apps/website

      - name: Validate browser release env
        run: ../../tool/validate_web_release_env.sh website
        working-directory: apps/website

      - name: Build
        run: npm run build
        working-directory: apps/website

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy apps/website/dist
            --project-name=${{ secrets.CLOUDFLARE_WEBSITE_PROJECT_NAME }}
            --branch=${{ github.ref_name }}

      - name: Deployment summary
        run: |
          echo "## Website deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Project:** ${CLOUDFLARE_WEBSITE_PROJECT_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "**Primary URL:** https://fanzone.ikanisa.com" >> "$GITHUB_STEP_SUMMARY"
          fi
