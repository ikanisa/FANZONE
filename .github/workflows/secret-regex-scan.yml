name: Secret Regex Scan

# Automatic GitHub Actions are disabled for the free-account release model.
# Run the same git-grep command locally before pushing.
on:
  workflow_dispatch:

jobs:
  secret-regex-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Block obvious live credentials
        run: |
          set -euo pipefail

          PATTERN='(eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}|sbp_[A-Za-z0-9_-]{20,}|postgresql://[^[:space:]]+:[^[:space:]]+@)'

          if git grep -nE "$PATTERN" -- \
            ':!.github/workflows/secret-regex-scan.yml' \
            ':!docs/free-account-release.md' \
            ':!docs/secret-rotation-runbook.md' \
            ':!**/.env*.example' \
            ':!**/package-lock.json'; then
            echo "Potential live credential found. Rotate it and remove it from git."
            exit 1
          fi
