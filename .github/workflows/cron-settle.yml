# FANZONE — Lean Prediction Cron
# Runs every 15 minutes to refresh upcoming match engine outputs and
# score finished user predictions.

name: Prediction Jobs Cron

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual trigger for testing

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  prediction-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate upcoming predictions
        run: |
          echo "🔄 Generating match predictions at $(date -u)"

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            "$SUPABASE_URL/functions/v1/generate-predictions" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Prediction generation completed successfully"
          else
            echo "❌ Prediction generation failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

      - name: Score finished predictions
        run: |
          echo "🔄 Scoring finished predictions at $(date -u)"

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            "$SUPABASE_URL/functions/v1/score-predictions" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Prediction scoring completed successfully"
          else
            echo "❌ Prediction scoring failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
