# FANZONE — Match Pool Settlement Cron
# Runs every 15 minutes to settle eligible finished match pools.

name: Match Pool Settlement Cron

# Automatic GitHub Actions schedules are disabled for the free-account release model.
# Use Supabase/platform cron or tool/run_supabase_cron_job.sh instead.
on:
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  settle-match-pools:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Settle finished match pools
        run: |
          echo "Settling finished match pools at $(date -u)"

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            "$SUPABASE_URL/functions/v1/settle-match-pools" \
            -d '{"limit":50}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pool settlement completed successfully"
          else
            echo "Pool settlement failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
