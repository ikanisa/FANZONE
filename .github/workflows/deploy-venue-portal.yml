name: Deploy Venue Dashboard

# Automatic GitHub Actions deploys are disabled for the free-account release model.
# Use tool/deploy_cloudflare_pages.sh for local Cloudflare Pages deploys.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-venue-portal-production
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_VENUE_PORTAL_PROJECT_NAME: ${{ secrets.CLOUDFLARE_VENUE_PORTAL_PROJECT_NAME }}
  VITE_PRIVILEGED_SESSION_MODE: bff

jobs:
  build-and-deploy:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Cloudflare venue dashboard configuration
        run: |
          test -n "${CLOUDFLARE_API_TOKEN}" || {
            echo "Missing CLOUDFLARE_API_TOKEN secret." >&2
            exit 1
          }
          test -n "${CLOUDFLARE_ACCOUNT_ID}" || {
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret." >&2
            exit 1
          }
          test -n "${CLOUDFLARE_VENUE_PORTAL_PROJECT_NAME}" || {
            echo "Missing CLOUDFLARE_VENUE_PORTAL_PROJECT_NAME secret." >&2
            exit 1
          }
          test -n "${{ secrets.VITE_SUPABASE_URL }}" || {
            echo "Missing VITE_SUPABASE_URL secret." >&2
            exit 1
          }
          test -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}" || {
            echo "Missing VITE_SUPABASE_ANON_KEY secret." >&2
            exit 1
          }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck -w @fanzone/venue-portal

      - name: Lint
        run: npm run lint -w @fanzone/venue-portal

      - name: Validate browser release env
        run: ./tool/validate_web_release_env.sh venue-portal
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GUEST_APP_URL: ${{ secrets.VITE_GUEST_APP_URL }}
          VITE_TV_DISPLAY_URL: ${{ secrets.VITE_TV_DISPLAY_URL }}
          VITE_PRIVILEGED_SESSION_MODE: bff

      - name: Build
        run: npm run build -w @fanzone/venue-portal
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GUEST_APP_URL: ${{ secrets.VITE_GUEST_APP_URL }}
          VITE_TV_DISPLAY_URL: ${{ secrets.VITE_TV_DISPLAY_URL }}
          VITE_PRIVILEGED_SESSION_MODE: bff

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy apps/venue-portal/dist
            --project-name=${{ secrets.CLOUDFLARE_VENUE_PORTAL_PROJECT_NAME }}
            --branch=${{ github.ref_name }}

      - name: Deployment summary
        run: |
          echo "## Venue dashboard deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Project:** ${CLOUDFLARE_VENUE_PORTAL_PROJECT_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
